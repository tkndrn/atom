name: Update Link

on:
  schedule:
    - cron: "0 12-17 * * *"
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Repo indir
        uses: actions/checkout@v3

      - name: Python kur
        uses: actions/setup-python@v4
        with:
          python-version: "3.x"

      - name: requests kur
        run: pip install requests

      - name: Script çalıştır
        run: python link.py

      - name: Değişikliği gönder
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add link.txt
          git diff --staged --quiet || git commit -m "link guncellendi"
          git push
